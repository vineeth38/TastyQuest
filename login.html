<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepie Login</title>
</head>
<style>
    #loginForm{
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    #loginForm input{
        width: 200px;
    }
</style>
<body>
    <div>
        <form id="loginForm">
        <label for="email" class="input_box">Email</label>
        <input type="email" id="email" required>
        <label for="password" class="input_box">Password</label>
        <input type="password" id="password" required>
        <button type="submit" style="width: 50px;">Login</button>
        <p>Don't have an account ? <a href="register.html" style="text-decoration: none;">Sign up</a></p>
        </form>
    </div>
    <script type="module" src="login.js"></script>
</body>
</html>
